# Software and tools listed on the Data & Tools page.
# Each entry needs a unique `id`. Displayed alphabetically by title.
# `authors` (surnames) controls whose CV a tool appears on.

- id: slocumio-jl
  title: SlocumIO.jl
  description: >-
    A pure-Julia reader for Slocum glider binary data — a Julia
    implementation of dbdreader.
  repo: https://github.com/oceansensing/SlocumIO.jl
  language: Julia
  authors: [Gong]
- id: seaexplorerio-jl
  title: SeaExplorerIO.jl
  description: >-
    A pure-Julia data reader for SeaExplorer glider navigation and payload
    data.
  repo: https://github.com/oceansensing/SeaExplorerIO.jl
  language: Julia
  authors: [Gong]
- id: glideradcp-jl
  title: GliderADCP.jl
  description: >-
    Pure-Julia implementation of a glider ADCP data processing pipeline.
  repo: https://github.com/oceansensing/GliderADCP.jl
  language: Julia
  authors: [Gong]
- id: oceansensing-org
  title: oceansensing on GitHub
  description: >-
    The lab's GitHub organization, home to glider piloting, data processing,
    and analysis code — and the source of this website.
  repo: https://github.com/oceansensing
- id: ocean-data-tools
  title: ocean_data_tools
  description: >-
    A MATLAB toolbox for interacting with common ocean data sources — Argo,
    gliders, CTD, models — published in the Journal of Open Source Software.
  repo: https://github.com/lnferris/ocean_data_tools
  language: MATLAB
  authors: [Ferris]
